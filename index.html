<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion King</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: black;
}

/* Navbar */
nav {
    background: #111;
    padding: 15px;
    text-align: center;
}

nav a {
    color: gold;
    margin: 15px;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    color: red;
}

/* Header */
header {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

header h1 {
    font-size: 60px;
    color: gold;
    text-shadow: 0 0 20px black;
}

header p {
    font-size: 25px;
}

/* Section */
.section {
    padding: 50px;
    text-align: center;
}

.card {
    background: #111;
    margin: 20px auto;
    padding: 20px;
    width: 80%;
    border-radius: 15px;
    box-shadow: 0 0 20px red;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* WhatsApp icon */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 25px;
    text-decoration: none;
    color: white;
}
</style>

</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
</nav>

<header>
    <h1>🦂 Scorpion King 🦂</h1>
    <p>Welcome to my professional website 🔥</p>
</header>

<div class="section">
    <div class="card">
        <h2>👑 About Me</h2>
        <p>أنا محمد، مطور مواقع وده أول موقعي 🚀</p>
    </div>

    <div class="card">
        <h2>💻 Projects</h2>
        <p>هنا هضيف أقوى مشاريعي قريبًا 🔥</p>
    </div>

    <div class="card">
        <h2>📞 Contact</h2>
        <p>تواصل معايا بسهولة 👇</p>
    </div>
</div>

<!-- WhatsApp -->
<a href="https://wa.me/201234567890" class="whatsapp">💬</a>

</body>
</html>
